<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>CodeLens AI - Automated Code Auditor</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <style>
        /* Custom scrollbar for a polished look */
        ::-webkit-scrollbar { width: 8px; height: 8px; }
        ::-webkit-scrollbar-track { background: #111827; }
        ::-webkit-scrollbar-thumb { background: #374151; border-radius: 4px; }
        ::-webkit-scrollbar-thumb:hover { background: #4B5563; }
    </style>
</head>
<body class="bg-gray-950 text-gray-200 font-sans min-h-screen flex flex-col">

    <header class="bg-gray-900 border-b border-gray-800 p-4 shadow-md">
        <div class="max-w-7xl mx-auto flex justify-between items-center">
            <h1 class="text-2xl font-bold bg-clip-text text-transparent bg-gradient-to-r from-blue-400 to-emerald-400 flex items-center gap-2">
                <svg class="w-6 h-6 text-blue-400" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M10 20l4-16m4 4l4 4-4 4M6 16l-4-4 4-4"></path></svg>
                CodeLens AI Engine
            </h1>
            <span class="text-xs font-mono bg-gray-800 px-2 py-1 rounded text-gray-400 border border-gray-700">v1.0-alpha</span>
        </div>
    </header>

    <main class="flex-grow max-w-7xl mx-auto w-full p-4 grid grid-cols-1 lg:grid-cols-2 gap-6 mt-4">
        
        <div class="flex flex-col gap-4">
            <div class="bg-gray-900 rounded-lg border border-gray-800 p-4 shadow-lg flex flex-col h-full">
                <div class="flex justify-between items-center mb-4">
                    <h2 class="text-sm font-semibold uppercase tracking-wider text-gray-400">Target Code</h2>
                    <select id="language" class="bg-gray-800 border border-gray-700 text-sm rounded-md px-3 py-1.5 focus:outline-none focus:border-blue-500 transition-colors">
                        <option value="Java">Java</option>
                        <option value="C++">C++</option>
                        <option value="Python">Python</option>
                    </select>
                </div>
                <textarea id="codeInput" class="w-full flex-grow bg-gray-950 border border-gray-800 rounded-md p-4 font-mono text-sm resize-none focus:outline-none focus:border-blue-500 transition-colors" placeholder="Paste your raw code here..." spellcheck="false" style="min-height: 400px;"></textarea>
                <button id="analyzeBtn" class="mt-4 w-full bg-blue-600 hover:bg-blue-500 text-white font-semibold py-3 rounded-md transition-all duration-200 flex justify-center items-center gap-2">
                    <span>Execute Code Audit</span>
                    <svg id="loadingSpinner" class="w-5 h-5 animate-spin hidden" fill="none" viewBox="0 0 24 24"><circle class="opacity-25" cx="12" cy="12" r="10" stroke="currentColor" stroke-width="4"></circle><path class="opacity-75" fill="currentColor" d="M4 12a8 8 0 018-8V0C5.373 0 0 5.373 0 12h4zm2 5.291A7.962 7.962 0 014 12H0c0 3.042 1.135 5.824 3 7.938l3-2.647z"></path></svg>
                </button>
            </div>
        </div>

        <div class="flex flex-col gap-4">
            <div id="resultsPanel" class="bg-gray-900 rounded-lg border border-gray-800 p-4 shadow-lg flex flex-col h-full hidden">
                <h2 class="text-sm font-semibold uppercase tracking-wider text-gray-400 border-b border-gray-800 pb-2 mb-4">Audit Results</h2>
                
                <div class="grid grid-cols-2 gap-4 mb-6">
                    <div class="bg-gray-950 p-4 rounded border border-gray-800">
                        <p class="text-xs text-gray-500 uppercase">Time Complexity</p>
                        <p id="timeComplexity" class="text-xl font-mono font-bold text-yellow-400 mt-1">--</p>
                    </div>
                    <div class="bg-gray-950 p-4 rounded border border-gray-800">
                        <p class="text-xs text-gray-500 uppercase">Space Complexity</p>
                        <p id="spaceComplexity" class="text-xl font-mono font-bold text-emerald-400 mt-1">--</p>
                    </div>
                </div>

                <div class="mb-6">
                    <h3 class="text-xs font-semibold uppercase text-gray-500 mb-3">Detected Issues</h3>
                    <div id="issuesList" class="space-y-3 max-h-48 overflow-y-auto pr-2">
                        </div>
                </div>

                <div class="flex-grow flex flex-col">
                    <h3 class="text-xs font-semibold uppercase text-gray-500 mb-3">Optimized Output</h3>
                    <pre class="w-full flex-grow bg-gray-950 border border-gray-800 rounded-md p-4 font-mono text-sm overflow-x-auto"><code id="optimizedCode" class="text-blue-300"></code></pre>
                </div>
            </div>
            
            <div id="emptyState" class="bg-gray-900 rounded-lg border border-gray-800 p-4 shadow-lg flex flex-col items-center justify-center h-full text-center">
                <svg class="w-16 h-16 text-gray-700 mb-4" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="1.5" d="M19.428 15.428a2 2 0 00-1.022-.547l-2.387-.477a6 6 0 00-3.86.517l-.318.158a6 6 0 01-3.86.517L6.05 15.21a2 2 0 00-1.806.547M8 4h8l-1 1v5.172a2 2 0 00.586 1.414l5 5c1.26 1.26.367 3.414-1.415 3.414H4.828c-1.782 0-2.674-2.154-1.414-3.414l5-5A2 2 0 009 10.172V5L8 4z"></path></svg>
                <p class="text-gray-500">Awaiting code input.<br>The LLM response will render here.</p>
            </div>
        </div>

    </main>

    <script>
        document.getElementById('analyzeBtn').addEventListener('click', async () => {
            const code = document.getElementById('codeInput').value;
            const language = document.getElementById('language').value;
            const btn = document.getElementById('analyzeBtn');
            const spinner = document.getElementById('loadingSpinner');
            const resultsPanel = document.getElementById('resultsPanel');
            const emptyState = document.getElementById('emptyState');
            
            if (!code.trim()) {
                alert("Please paste some code first.");
                return;
            }

            // UI Loading State
            btn.disabled = true;
            btn.classList.add('opacity-75', 'cursor-not-allowed');
            spinner.classList.remove('hidden');

            try {
                const response = await fetch('/api/review', {
                    method: 'POST',
                    headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify({ code, language })
                });

                if (!response.ok) {
                    const errData = await response.json().catch(() => ({}));
                    throw new Error(errData.detail || "API request failed. Check server logs.");
                }
                const data = await response.json();

                // Populate UI
                document.getElementById('timeComplexity').innerText = data.time_complexity;
                document.getElementById('spaceComplexity').innerText = data.space_complexity;
                document.getElementById('optimizedCode').innerText = data.optimized_code;
                
                const issuesList = document.getElementById('issuesList');
                issuesList.innerHTML = '';
                
                if (data.issues && data.issues.length > 0) {
                    data.issues.forEach(issue => {
                        const typeColor = issue.type.toLowerCase() === 'security' ? 'text-red-400 border-red-400/30 bg-red-400/10' : 
                                          issue.type.toLowerCase() === 'performance' ? 'text-yellow-400 border-yellow-400/30 bg-yellow-400/10' : 
                                          'text-blue-400 border-blue-400/30 bg-blue-400/10';
                                          
                        issuesList.innerHTML += `
                            <div class="p-3 bg-gray-950 rounded border border-gray-800">
                                <div class="flex items-center gap-2 mb-1">
                                    <span class="text-[10px] uppercase font-bold px-2 py-0.5 rounded border ${typeColor}">${issue.type}</span>
                                </div>
                                <p class="text-sm text-gray-300 mb-1">${issue.description}</p>
                                <p class="text-sm text-gray-500"><span class="font-semibold text-gray-400">Fix:</span> ${issue.suggestion}</p>
                            </div>
                        `;
                    });
                } else {
                    issuesList.innerHTML = '<p class="text-sm text-emerald-400">No issues found. The code looks solid.</p>';
                }

                // Swap panels
                emptyState.classList.add('hidden');
                resultsPanel.classList.remove('hidden');

            } catch (error) {
                console.error(error);
                alert(`Error: ${error.message}`);
            } finally {
                // Reset UI Loading State
                btn.disabled = false;
                btn.classList.remove('opacity-75', 'cursor-not-allowed');
                spinner.classList.add('hidden');
            }
        });
    </script>
</body>
</html>
